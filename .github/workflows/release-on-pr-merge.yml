name: PR 合并自动发布 Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  analyze-and-update-release:
    name: 分析 PR 并更新 Release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      version: ${{ steps.read_version.outputs.current_version }}
      release_exists: ${{ steps.check_release.outputs.exists }}
      pr_title: ${{ github.event.pull_request.title }}
      pr_number: ${{ github.event.pull_request.number }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_RELEASE_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main  # 显式指定 main 分支，避免处于 PR ref 导致 push 失败
      
      - name: 提取 PR 信息
        id: extract_pr_info
        run: |
          echo "PR 标题: ${{ github.event.pull_request.title }}"
          echo "PR 编号: ${{ github.event.pull_request.number }}"
          echo "合并时间: $(date +'%Y-%m-%d')"
          
          # 提取 PR 标签
          LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"
          echo "PR 标签: $LABELS"
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
      
      - name: 分析 PR 类型
        id: analyze_type
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          LABELS="${{ steps.extract_pr_info.outputs.labels }}"
          
          # 根据 PR 标签确定类型
          if echo "$LABELS" | grep -q "enhancement"; then
            CHANGE_TYPE="新增"
          elif echo "$LABELS" | grep -q "bug"; then
            CHANGE_TYPE="修复"
          elif echo "$LABELS" | grep -q "documentation"; then
            CHANGE_TYPE="文档"
          elif echo "$LABELS" | grep -q "refactor"; then
            CHANGE_TYPE="重构"
          elif echo "$LABELS" | grep -q "performance"; then
            CHANGE_TYPE="优化"
          else
            # 根据标题前缀判断
            if echo "$TITLE" | grep -qiE "^(feat|add|new|新增|添加)"; then
              CHANGE_TYPE="新增"
            elif echo "$TITLE" | grep -qiE "^(fix|bug|修复)"; then
              CHANGE_TYPE="修复"
            elif echo "$TITLE" | grep -qiE "^(doc|docs|readme|更新文档)"; then
              CHANGE_TYPE="文档"
            elif echo "$TITLE" | grep -qiE "^(refactor|重构)"; then
              CHANGE_TYPE="重构"
            elif echo "$TITLE" | grep -qiE "^(perf|performance|优化)"; then
              CHANGE_TYPE="优化"
            else
              CHANGE_TYPE="改进"
            fi
          fi
          
          echo "change_type=$CHANGE_TYPE" >> $GITHUB_OUTPUT
          echo "变更类型: $CHANGE_TYPE"
      
      - name: 提取提交信息到文件
        run: |
          git log --pretty=format:"%s" ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} > "${{ runner.temp }}/commits_list.txt"
          
          echo "📝 提交信息已写入 ${{ runner.temp }}/commits_list.txt"
      
      - name: 读取当前版本
        id: read_version
        run: |
          # 读取 main.py 中的当前版本号（支持单/双引号及不同空格）
          if [ -f main.py ]; then
            CURRENT_VERSION=$(
              sed -n "s/^[[:space:]]*__version__[[:space:]]*=[[:space:]]*['\"]\([^'\"]*\)['\"].*/\1/p" main.py | head -n 1
            )

            # 如果未能解析出版本号则直接失败，避免创建错误 tag（如 v）
            if [ -z "$CURRENT_VERSION" ]; then
              echo "无法从 main.py 解析版本号，请检查 __version__ 定义格式是否正确。" >&2
              exit 1
            fi
          else
            CURRENT_VERSION="未知版本"
          fi

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "main.py 当前版本: $CURRENT_VERSION"

          # 获取今天日期
          TODAY=$(date +'%Y-%m-%d')
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          echo "今天日期: $TODAY"
      
      - name: 检查 Release 是否存在
        id: check_release
        run: |
          VERSION="${{ steps.read_version.outputs.current_version }}"
          TAG_NAME="v${VERSION}"
          
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Release $TAG_NAME 已存在"
            
            # 获取现有 Release 描述
            gh release view "$TAG_NAME" --json body -q .body > current_body.txt
            echo "现有 Release 描述已读取"
            
            # 解析现有描述中的最新日期
            LAST_DATE=$(grep -oP '\d{4}-\d{2}-\d{2}' current_body.txt | head -1)
            if [ -z "$LAST_DATE" ]; then
              LAST_DATE=""
            fi
            echo "last_date=$LAST_DATE" >> $GITHUB_OUTPUT
            echo "最新条目日期: $LAST_DATE"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Release $TAG_NAME 不存在，将创建新 Release"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_PAT || secrets.GITHUB_TOKEN }}
      
      - name: 生成 Release 描述
        id: generate_release_notes
        run: |
          COMMITS_FILE="${RUNNER_TEMP}/commits_list.txt"
          
          if [ "$EXISTS" = "false" ]; then
            # 新 Release：生成初始描述
            {
              echo "## 🎉 Release v${VERSION} - ${TODAY}"
              echo ""
              echo "### ${CHANGE_TYPE}"
              echo "- **${TITLE}** (PR #${PR_NUM})"
              echo ""
            } > new_entry.txt
            
            # 添加提交信息（从文件读取）
            if [ -s "$COMMITS_FILE" ]; then
              while IFS= read -r commit; do
                [ -n "$commit" ] && echo "- ${commit}" >> new_entry.txt
              done < "$COMMITS_FILE"
              echo "" >> new_entry.txt
            fi
            
            echo "---" >> new_entry.txt
            echo "" >> new_entry.txt
            
            cat new_entry.txt > release_notes.txt
            rm -f new_entry.txt
            
            echo "生成了新的 Release 描述"
          else
            # 更新现有 Release
            
            # 生成新条目
            {
              echo "### ${CHANGE_TYPE}"
              echo "- **${TITLE}** (PR #${PR_NUM})"
              echo ""
            } > new_entry.txt
            
            # 添加提交信息（从文件读取）
            if [ -s "$COMMITS_FILE" ]; then
              while IFS= read -r commit; do
                [ -n "$commit" ] && echo "- ${commit}" >> new_entry.txt
              done < "$COMMITS_FILE"
              echo "" >> new_entry.txt
            fi
            
            # 判断追加位置
            if [ "$LAST_DATE" = "$TODAY" ]; then
              # 日期相同：追加到当天条目末尾（在 --- 之前）
              awk -v new_entry="new_entry.txt" '
                BEGIN {
                  inserted = 0
                  while ((getline line < new_entry) > 0) {
                    new_entries[++n] = line
                  }
                  close(new_entry)
                }
                /^---$/ && inserted == 0 {
                  # 在分隔线之前插入新条目
                  for (i = 1; i <= n; i++) {
                    print new_entries[i]
                  }
                  print ""
                  inserted = 1
                }
                { print }
              ' current_body.txt > release_notes.txt
              echo "已追加到今天的条目"
            else
              # 日期不同：在文件开头插入新日期分组
              {
                echo "## 🎉 Release v${VERSION} - ${TODAY}"
                echo ""
              } > header.txt
              cat new_entry.txt >> header.txt
              echo "---" >> header.txt
              echo "" >> header.txt
              cat current_body.txt >> header.txt
              mv header.txt release_notes.txt
              echo "已创建新的日期分组"
            fi
            
            rm -f new_entry.txt
          fi
          
          echo "✅ Release 描述已生成"
          echo "---"
          cat release_notes.txt
          
          # 只输出版本信息，不输出完整内容（避免参数过长）
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "exists=${EXISTS}" >> $GITHUB_OUTPUT
        env:
          VERSION: ${{ steps.read_version.outputs.current_version }}
          TODAY: ${{ steps.read_version.outputs.today }}
          CHANGE_TYPE: ${{ steps.analyze_type.outputs.change_type }}
          TITLE: ${{ github.event.pull_request.title }}
          PR_NUM: ${{ github.event.pull_request.number }}
          EXISTS: ${{ steps.check_release.outputs.exists }}
          LAST_DATE: ${{ steps.check_release.outputs.last_date }}
      
      - name: 创建或更新 Release
        id: create_or_update_release
        run: |
          VERSION="${{ steps.read_version.outputs.current_version }}"
          TAG_NAME="v${VERSION}"
          EXISTS="${{ steps.check_release.outputs.exists }}"
          
          if [ "$EXISTS" = "false" ]; then
            # 创建新 Release
            echo "📝 正在创建 Release ${TAG_NAME}..."
            gh release create "$TAG_NAME" \
              --title "Release ${TAG_NAME}" \
              --notes-file release_notes.txt \
              --latest
            echo "✅ Release ${TAG_NAME} 已创建"
            echo "release_action=created" >> $GITHUB_OUTPUT
          else
            # 更新现有 Release
            echo "📝 正在更新 Release ${TAG_NAME}..."
            gh release edit "$TAG_NAME" \
              --notes-file release_notes.txt
            echo "✅ Release ${TAG_NAME} 已更新"
            echo "release_action=updated" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_PAT || secrets.GITHUB_TOKEN }}
      
      - name: 更新 CHANGELOG.md 为引流页面
        run: |
          # 检查 CHANGELOG.md 是否已包含引流提示
          if ! grep -q "查看最新的变更日志，请访问" CHANGELOG.md; then
            echo "📝 正在更新 CHANGELOG.md 为引流页面..."
            
            # 创建临时文件
            {
              echo "# 📋 变更日志"
              echo ""
              echo "> **查看最新的变更日志，请访问 [GitHub Releases](https://github.com/${{ github.repository }}/releases)**"
              echo ""
              echo "本文件仅保留用于历史记录参考。完整的版本发布说明和功能变更记录请查看 GitHub Releases 页面。"
              echo ""
              echo "---"
              echo ""
              echo "## 历史变更记录"
              echo ""
              # 保留原有内容
              cat CHANGELOG.md
            } > CHANGELOG.md.new
            
            mv CHANGELOG.md.new CHANGELOG.md
            
            # 提交更改
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "docs: 更新 CHANGELOG.md 为引流页面"
            git push
            
            echo "✅ CHANGELOG.md 已更新为引流页面"
          else
            echo "ℹ️ CHANGELOG.md 已是引流页面，跳过更新"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_PAT || secrets.GITHUB_TOKEN }}
      
      - name: 发送评论到 PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.read_version.outputs.current_version }}';
            const exists = '${{ steps.check_release.outputs.exists }}';
            const action = exists === 'true' ? '更新' : '创建';
            
            // 读取 release_notes.txt 文件内容（按字节数安全截断预览，避免截断多字节字符）
            const fs = require('fs');
            let notesPreview = '';
            try {
              // 检查文件是否存在
              if (!fs.existsSync('release_notes.txt')) {
                throw new Error('release_notes.txt 文件不存在');
              }
              const notes = fs.readFileSync('release_notes.txt', 'utf8');
              // 转义反引号以避免破坏 Markdown 代码块
              notesPreview = notes.replace(/`/g, '\\`');

              // 按 UTF-8 字节长度进行截断，确保不截断多字节字符（如 emoji）
              const MAX_PREVIEW_BYTES = 1000;
              const truncateByBytes = (input, maxBytes) => {
                let bytes = 0;
                let result = '';

                for (const ch of input) {
                  const chBytes = Buffer.byteLength(ch, 'utf8');
                  if (bytes + chBytes > maxBytes) {
                    break;
                  }
                  bytes += chBytes;
                  result += ch;
                }

                return result.length < input.length ? `${result}...` : result;
              };

              notesPreview = truncateByBytes(notesPreview, MAX_PREVIEW_BYTES);
            } catch (e) {
              core.warning(`读取 release_notes.txt 失败: ${e instanceof Error ? e.message : String(e)}`);
              notesPreview = '(无法读取预览)';
            }
            
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📝 **已${action} Release v${version} 描述**\n\n\`\`\`\n${notesPreview}\n\`\`\`\n\n---\n\n✅ 变更已记录到 [GitHub Releases](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/v${version})\n\n📦 附件正在打包中，请稍候...`
            });
      
      - name: 清理临时文件
        if: always()
        run: |
          rm -f release_notes.txt current_body.txt new_entry.txt header.txt 2>/dev/null || true
          rm -f "${RUNNER_TEMP}/commits_list.txt" 2>/dev/null || true
          echo "✅ 临时文件已清理"

  build-and-upload-assets:
    name: 打包并上传附件
    runs-on: ubuntu-latest
    needs: analyze-and-update-release
    if: always() && needs.analyze-and-update-release.result == 'success'
    permissions:
      contents: write
    
    steps:
      - name: 检出代码（使用合并后的 main 分支）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main  # 确保使用的是合并后的 main 分支代码
      
      - name: 验证项目结构
        run: |
          if [ ! -f "main.py" ]; then
            echo "❌ 错误: main.py 文件不存在"
            exit 1
          fi
          if [ ! -f "requirements.txt" ]; then
            echo "❌ 错误: requirements.txt 文件不存在"
            exit 1
          fi
          if [ ! -d "core" ]; then
            echo "❌ 错误: core 目录不存在"
            exit 1
          fi
          echo "✅ 项目结构验证通过"
      
      - name: 设置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: 获取版本信息
        id: get_version
        run: |
          VERSION="${{ needs.analyze-and-update-release.outputs.version }}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=v${VERSION}" >> $GITHUB_OUTPUT
          echo "当前版本: ${VERSION}"
      
      - name: 等待 Release 创建并验证 Tag
        id: verify_tag
        run: |
          TAG_NAME="${{ steps.get_version.outputs.TAG_NAME }}"
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          
          echo "⏳ 等待 Release 创建完成..."
          
          # 等待最多 30 秒，确保 Release 创建完成
          MAX_RETRIES=6
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            # 检查 Tag 是否已经生效
            if git ls-remote --tags origin | grep -q "refs/tags/${TAG_NAME}$"; then
              echo "✅ Tag ${TAG_NAME} 已确认存在"
              echo "tag_verified=true" >> $GITHUB_OUTPUT
              break
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "⏳ 等待 Tag 生效... ($RETRY_COUNT/$MAX_RETRIES)"
            sleep 5
          done
          
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "❌ 错误: Tag ${TAG_NAME} 未能在预期时间内生效"
            echo "tag_verified=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # 验证 Release 是否存在
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "❌ 错误: Release ${TAG_NAME} 不存在"
            exit 1
          fi
          
          echo "✅ Release ${TAG_NAME} 已确认存在"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 检查并清理 Release 附件状态
        id: check_assets
        run: |
          TAG_NAME="${{ steps.get_version.outputs.TAG_NAME }}"
          
          # 检查是否有附件
          ASSETS=$(gh release view "$TAG_NAME" --json assets -q '.assets | length')
          echo "现有附件数量: $ASSETS"
          
          if [ "$ASSETS" -gt 0 ]; then
            echo "🗑️ 检测到已有附件，正在清理旧附件..."
            
            # 获取所有附件名称并删除
            ASSET_NAMES=$(gh release view "$TAG_NAME" --json assets -q '.assets[].name')
            for asset in $ASSET_NAMES; do
              echo "  删除附件: $asset"
              gh release delete-asset "$TAG_NAME" "$asset" -y
            done
            
            echo "✅ 已删除 $ASSETS 个旧附件"
          else
            echo "ℹ️ Release 没有附件"
          fi
          
          # 无论是否有旧附件，都标记为需要上传（确保附件与代码同步）
          echo "should_upload=true" >> $GITHUB_OUTPUT
          echo "has_assets=false" >> $GITHUB_OUTPUT
          echo "ℹ️ 将上传新的发布附件"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 创建发布资源包
        if: steps.check_assets.outputs.should_upload == 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG_NAME="${{ steps.get_version.outputs.TAG_NAME }}"
          RELEASE_NAME="${TAG_NAME}"
          RELEASE_DIR="Sakura-Bot-${RELEASE_NAME}"
          
          mkdir -p "$RELEASE_DIR"
          
          echo "📦 正在打包发布资源..."
          
          echo "📋 打包配置:" > packaging_manifest.txt
          echo "- 版本: ${VERSION}" >> packaging_manifest.txt
          echo "- Tag: ${TAG_NAME}" >> packaging_manifest.txt
          echo "" >> packaging_manifest.txt
          echo "📦 包含文件:" >> packaging_manifest.txt
          
          # 复制核心代码
          if [ -f "main.py" ]; then 
            cp main.py "$RELEASE_DIR/"
            echo "- main.py" >> packaging_manifest.txt
          fi
          if [ -f "qa_bot.py" ]; then 
            cp qa_bot.py "$RELEASE_DIR/"
            echo "- qa_bot.py" >> packaging_manifest.txt
          fi
          find core -name "*.py" -exec cp --parents {} "$RELEASE_DIR/" \;
          # 递归删除 core 目录下所有 __pycache__ 目录，避免它们被打包进发布包
          find "${RELEASE_DIR}/core" -type d -name '__pycache__' -exec rm -rf {} +
          echo "- core/ (所有Python文件)" >> packaging_manifest.txt
          
          # 复制配置文件
          [ -f "pyproject.toml" ] && cp pyproject.toml "$RELEASE_DIR/" && echo "- pyproject.toml" >> packaging_manifest.txt
          [ -f "pytest.ini" ] && cp pytest.ini "$RELEASE_DIR/" && echo "- pytest.ini" >> packaging_manifest.txt
          [ -f ".gitignore" ] && cp .gitignore "$RELEASE_DIR/" && echo "- .gitignore" >> packaging_manifest.txt
          
          # 包含tests目录
          if [ -d "tests" ]; then
            cp -r tests "$RELEASE_DIR/"
            echo "- tests/" >> packaging_manifest.txt
          fi
          
          # 包含wiki文档
          if [ -d "wiki" ]; then
            cp -r wiki "$RELEASE_DIR/"
            echo "- wiki/" >> packaging_manifest.txt
          fi
          
          # 创建必要的目录
          mkdir -p "$RELEASE_DIR/data"
          mkdir -p "$RELEASE_DIR/data/sessions"
          mkdir -p "$RELEASE_DIR/data/vectors"
          
          # 复制配置文件
          [ -f "data/.env.example" ] && cp "data/.env.example" "$RELEASE_DIR/data/" && echo "- data/.env.example" >> packaging_manifest.txt
          [ -f "data/config.example.json" ] && cp "data/config.example.json" "$RELEASE_DIR/data/" && echo "- data/config.example.json" >> packaging_manifest.txt
          [ -f "data/prompt.txt" ] && cp "data/prompt.txt" "$RELEASE_DIR/data/" && echo "- data/prompt.txt" >> packaging_manifest.txt
          [ -f "data/poll_prompt.txt" ] && cp "data/poll_prompt.txt" "$RELEASE_DIR/data/" && echo "- data/poll_prompt.txt" >> packaging_manifest.txt
          [ -f "data/qa_persona.txt" ] && cp "data/qa_persona.txt" "$RELEASE_DIR/data/" && echo "- data/qa_persona.txt" >> packaging_manifest.txt
          
          # 复制必要文件
          [ -f "requirements.txt" ] && cp requirements.txt "$RELEASE_DIR/" && echo "- requirements.txt" >> packaging_manifest.txt
          [ -f "README.md" ] && cp README.md "$RELEASE_DIR/" && echo "- README.md" >> packaging_manifest.txt
          [ -f "README_EN.md" ] && cp README_EN.md "$RELEASE_DIR/" && echo "- README_EN.md" >> packaging_manifest.txt
          [ -f "CHANGELOG.md" ] && cp CHANGELOG.md "$RELEASE_DIR/" && echo "- CHANGELOG.md" >> packaging_manifest.txt
          [ -f "LICENSE" ] && cp LICENSE "$RELEASE_DIR/" && echo "- LICENSE" >> packaging_manifest.txt
          [ -f "CONTRIBUTING.md" ] && cp CONTRIBUTING.md "$RELEASE_DIR/" && echo "- CONTRIBUTING.md" >> packaging_manifest.txt
          
          # 复制启动脚本
          [ -f "start.bat" ] && cp start.bat "$RELEASE_DIR/" && echo "- start.bat" >> packaging_manifest.txt
          [ -f "start.sh" ] && cp start.sh "$RELEASE_DIR/" && echo "- start.sh" >> packaging_manifest.txt
          
          # 复制 Docker 文件
          [ -f "Dockerfile" ] && cp Dockerfile "$RELEASE_DIR/" && echo "- Dockerfile" >> packaging_manifest.txt
          [ -f "docker-compose.yml" ] && cp docker-compose.yml "$RELEASE_DIR/" && echo "- docker-compose.yml" >> packaging_manifest.txt
          [ -f "docker-entrypoint.sh" ] && cp docker-entrypoint.sh "$RELEASE_DIR/" && echo "- docker-entrypoint.sh" >> packaging_manifest.txt
          [ -f ".dockerignore" ] && cp .dockerignore "$RELEASE_DIR/" && echo "- .dockerignore" >> packaging_manifest.txt
          
          # 设置可执行权限
          chmod +x "$RELEASE_DIR/start.sh" 2>/dev/null || true
          chmod +x "$RELEASE_DIR/docker-entrypoint.sh" 2>/dev/null || true
          
          # 创建压缩包
          echo "" >> packaging_manifest.txt
          echo "🗜️ 正在创建压缩包..." >> packaging_manifest.txt
          tar -czf "${RELEASE_DIR}.tar.gz" "$RELEASE_DIR/"
          zip -q -r "${RELEASE_DIR}.zip" "$RELEASE_DIR/"
          
          # 计算文件大小
          TAR_SIZE=$(du -h "${RELEASE_DIR}.tar.gz" | cut -f1)
          ZIP_SIZE=$(du -h "${RELEASE_DIR}.zip" | cut -f1)
          
          echo "✅ 资源包创建完成" >> packaging_manifest.txt
          echo "- ${RELEASE_DIR}.tar.gz: ${TAR_SIZE}" >> packaging_manifest.txt
          echo "- ${RELEASE_DIR}.zip: ${ZIP_SIZE}" >> packaging_manifest.txt
          
          echo "✅ 资源包创建完成"
          cat packaging_manifest.txt
      
      - name: 上传发布资源
        if: steps.check_assets.outputs.should_upload == 'true'
        run: |
          TAG_NAME="${{ steps.get_version.outputs.TAG_NAME }}"
          ASSET_NAME="Sakura-Bot-${TAG_NAME}"
          
          echo "正在上传资源到 Release ${TAG_NAME}..."
          
          gh release upload "$TAG_NAME" "${ASSET_NAME}.tar.gz" "${ASSET_NAME}.zip" --clobber
          
          echo "✅ 资源上传完成"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 发送 Telegram 通知（附件已上传）
        if: steps.check_assets.outputs.should_upload == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHANNEL_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            VERSION="${{ steps.get_version.outputs.VERSION }}"
            TAG_NAME="${{ steps.get_version.outputs.TAG_NAME }}"
            RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}"
            PR_NUMBER="${{ needs.analyze-and-update-release.outputs.pr_number }}"
            
            MESSAGE="🚀 **新版本发布通知**
            
            Sakura-Bot v${VERSION} 已发布！
            
            📦 版本: v${VERSION}
            🔖 PR: #${PR_NUMBER}
            
            📦 **下载附件**:
            ${RELEASE_URL}
            
            ---
            由 GitHub Actions 自动发布"
            
            # 发送消息到 Telegram，附带按钮
            curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${MESSAGE}" \
              -d "parse_mode=Markdown" \
              -d "disable_web_page_preview=true" \
              -d 'reply_markup={"inline_keyboard":[[{"text":"📄 View Release","url":"'"${RELEASE_URL}"'"}]]}'
            
            echo "✅ Telegram 通知已发送"
          else
            echo "⚠️ 未配置 Telegram 通知"
          fi
      
      - name: 生成发布摘要
        if: steps.check_assets.outputs.should_upload == 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG_NAME="${{ steps.get_version.outputs.TAG_NAME }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}"
          
          echo "# 🚀 Release ${TAG_NAME} 创建成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 版本: **v${VERSION}**" >> $GITHUB_STEP_SUMMARY
          echo "📦 附件: **已上传** (.tar.gz 和 .zip)" >> $GITHUB_STEP_SUMMARY
          echo "🔗 发布页面: [${RELEASE_URL}](${RELEASE_URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ **注意**: Release 描述和附件均已成功创建" >> $GITHUB_STEP_SUMMARY
      
      - name: 清理临时文件
        if: always()
        run: |
          rm -f packaging_manifest.txt
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          rm -rf "Sakura-Bot-v${VERSION}"
          rm -f "Sakura-Bot-v${VERSION}.tar.gz"
          rm -f "Sakura-Bot-v${VERSION}.zip"
          echo "✅ 临时文件已清理"