name: 自动创建 Release

on:
  workflow_run:
    workflows: ["PR 自动分析并更新 Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      force_update:
        description: '强制更新已存在的Release附件'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      include_tests:
        description: '是否包含tests目录'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      include_wiki:
        description: '是否包含wiki文档'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  analyze-changes:
    name: 分析代码变更
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      pull-requests: read
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 分析自上次发布以来的变更
        id: analyze
        run: |
          # 获取最新的 tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LATEST_TAG" ]; then
            echo "未找到之前的 tag，分析所有提交"
            BASE_SHA=$(git rev-list --max-parents=0 HEAD)
          else
            echo "最新 tag: $LATEST_TAG"
            BASE_SHA=$(git rev-list -n 1 $LATEST_TAG)
          fi
          
          echo "base_sha=$BASE_SHA" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          
          # 获取所有相关提交
          COMMITS=$(git log --pretty=format:"%h|%s|%an|%ae" $BASE_SHA..HEAD)
          
          # 统计提交数量
          COMMIT_COUNT=$(echo "$COMMITS" | wc -l)
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "提交数量: $COMMIT_COUNT"
          
          # 提取 PR 编号
          PR_NUMBERS=$(echo "$COMMITS" | grep -oE "#[0-9]+" | sort -u | tr '\n' ',')
          echo "pr_numbers=$PR_NUMBERS" >> $GITHUB_OUTPUT
          echo "相关 PR: $PR_NUMBERS"
          
          # 提取所有提交信息
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: 输出分析结果
        run: |
          echo "## 变更分析结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 最新 tag: ${{ steps.analyze.outputs.latest_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- 提交数量: ${{ steps.analyze.outputs.commit_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- 相关 PR: ${{ steps.analyze.outputs.pr_numbers }}" >> $GITHUB_STEP_SUMMARY
    
    outputs:
      base_sha: ${{ steps.analyze.outputs.base_sha }}
      latest_tag: ${{ steps.analyze.outputs.latest_tag }}
      commit_count: ${{ steps.analyze.outputs.commit_count }}
      pr_numbers: ${{ steps.analyze.outputs.pr_numbers }}
      commits: ${{ steps.analyze.outputs.commits }}

  create-release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    needs: analyze-changes
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 验证项目结构
        run: |
          if [ ! -f "main.py" ]; then
            echo "❌ 错误: main.py 文件不存在"
            exit 1
          fi
          if [ ! -f "requirements.txt" ]; then
            echo "❌ 错误: requirements.txt 文件不存在"
            exit 1
          fi
          if [ ! -d "core" ]; then
            echo "❌ 错误: core 目录不存在"
            exit 1
          fi
          echo "✅ 项目结构验证通过"
      
      - name: 设置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: 获取当前版本
        id: get_version
        run: |
          if [ -f "main.py" ]; then
            PY_VERSION=$(grep -o "__version__ = \"[^\"]*\"" main.py | cut -d'"' -f2)
            echo "PY_VERSION=${PY_VERSION}" >> $GITHUB_OUTPUT
            echo "当前版本: ${PY_VERSION}"
          else
            echo "❌ 错误: main.py 文件不存在"
            exit 1
          fi
      
      - name: 检查版本是否已存在
        id: check_version
        run: |
          VERSION="${{ steps.get_version.outputs.PY_VERSION }}"
          TAG_NAME="v${VERSION}"
          FORCE_UPDATE="${{ github.event.inputs.force_update || 'false' }}"
          
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            if [ "$FORCE_UPDATE" = "true" ]; then
              echo "⚠️ 版本 $VERSION 的发布已存在，但强制更新已启用"
              echo "SHOULD_CREATE=false" >> $GITHUB_OUTPUT
              echo "SHOULD_UPDATE=true" >> $GITHUB_OUTPUT
              echo "RELEASE_EXISTS=true" >> $GITHUB_OUTPUT
            else
              echo "⚠️ 版本 $VERSION 的发布已存在，将跳过创建"
              echo "SHOULD_CREATE=false" >> $GITHUB_OUTPUT
              echo "SHOULD_UPDATE=false" >> $GITHUB_OUTPUT
              echo "RELEASE_EXISTS=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "✅ 版本 $VERSION 是新版本，将创建发布"
            echo "SHOULD_CREATE=true" >> $GITHUB_OUTPUT
            echo "SHOULD_UPDATE=false" >> $GITHUB_OUTPUT
            echo "RELEASE_EXISTS=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 生成发布信息
        if: steps.check_version.outputs.SHOULD_CREATE == 'true'
        id: generate_release_info
        run: |
          VERSION="${{ steps.get_version.outputs.PY_VERSION }}"
          TAG_NAME="v${VERSION}"
          echo "RELEASE_NAME=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "发布标签: ${TAG_NAME}"
          
          RELEASE_TITLE="🚀 Release v${VERSION}"
          echo "RELEASE_TITLE=${RELEASE_TITLE}" >> $GITHUB_OUTPUT
      
      - name: 生成发布信息
        if: steps.check_version.outputs.SHOULD_UPDATE == 'true'
        id: generate_release_info_update
        run: |
          VERSION="${{ steps.get_version.outputs.PY_VERSION }}"
          TAG_NAME="v${VERSION}"
          echo "RELEASE_NAME=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "发布标签: ${TAG_NAME}"
          
          RELEASE_TITLE="🚀 Release v${VERSION}"
          echo "RELEASE_TITLE=${RELEASE_TITLE}" >> $GITHUB_OUTPUT
      
      - name: 读取现有 Release 描述
        id: read_release_notes
        if: steps.check_version.outputs.SHOULD_CREATE == 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.PY_VERSION }}"
          TAG_NAME="v${VERSION}"
          
          # Release 描述已由 pr-analyzer.yml 维护，这里直接读取
          if gh release view "$TAG_NAME" --json body -q .body > existing_notes.md 2>/dev/null; then
            echo "ℹ️ 读取现有 Release 描述"
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            cat existing_notes.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Release 描述为空，将使用默认描述"
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "## 🎉 Release v${VERSION}" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "Release 描述由 PR 合并自动维护" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 创建 GitHub Release
        if: steps.check_version.outputs.SHOULD_CREATE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.generate_release_info.outputs.RELEASE_NAME }}
          name: ${{ steps.generate_release_info.outputs.RELEASE_TITLE }}
          body: "${{ steps.read_release_notes.outputs.notes }}"
          draft: false
          prerelease: false
          generate_release_notes: false
      
      - name: 创建发布资源包
        if: steps.check_version.outputs.SHOULD_CREATE == 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.PY_VERSION }}"
          RELEASE_NAME="${{ steps.generate_release_info.outputs.RELEASE_NAME }}"
          RELEASE_DIR="Sakura-Bot-${RELEASE_NAME}"
          INCLUDE_TESTS="${{ github.event.inputs.include_tests || 'true' }}"
          INCLUDE_WIKI="${{ github.event.inputs.include_wiki || 'true' }}"
          
          mkdir -p "$RELEASE_DIR"
          
          echo "📦 正在打包发布资源..."
          echo "📋 打包配置:" > packaging_manifest.txt
          echo "- 版本: ${VERSION}" >> packaging_manifest.txt
          echo "- 包含测试: ${INCLUDE_TESTS}" >> packaging_manifest.txt
          echo "- 包含Wiki: ${INCLUDE_WIKI}" >> packaging_manifest.txt
          echo "" >> packaging_manifest.txt
          echo "📦 包含文件:" >> packaging_manifest.txt
          
          # 复制核心代码
          if [ -f "main.py" ]; then 
            cp main.py "$RELEASE_DIR/"
            echo "- main.py" >> packaging_manifest.txt
          fi
          if [ -f "qa_bot.py" ]; then 
            cp qa_bot.py "$RELEASE_DIR/"
            echo "- qa_bot.py" >> packaging_manifest.txt
          fi
          find core -name "*.py" -exec cp --parents {} "$RELEASE_DIR/" \;
          rm -rf "$RELEASE_DIR/core/__pycache__"
          echo "- core/ (所有Python文件)" >> packaging_manifest.txt
          
          # 复制配置文件
          [ -f "pyproject.toml" ] && cp pyproject.toml "$RELEASE_DIR/" && echo "- pyproject.toml" >> packaging_manifest.txt
          [ -f "pytest.ini" ] && cp pytest.ini "$RELEASE_DIR/" && echo "- pytest.ini" >> packaging_manifest.txt
          [ -f ".gitignore" ] && cp .gitignore "$RELEASE_DIR/" && echo "- .gitignore" >> packaging_manifest.txt
          
          # 可选：包含tests目录
          if [ "$INCLUDE_TESTS" = "true" ] && [ -d "tests" ]; then
            cp -r tests "$RELEASE_DIR/"
            echo "- tests/" >> packaging_manifest.txt
          fi
          
          # 可选：包含wiki文档
          if [ "$INCLUDE_WIKI" = "true" ] && [ -d "wiki" ]; then
            cp -r wiki "$RELEASE_DIR/"
            echo "- wiki/" >> packaging_manifest.txt
          fi
          
          # 创建必要的目录
          mkdir -p "$RELEASE_DIR/data"
          mkdir -p "$RELEASE_DIR/data/sessions"
          mkdir -p "$RELEASE_DIR/data/vectors"
          
          # 复制配置文件
          [ -f "data/.env.example" ] && cp "data/.env.example" "$RELEASE_DIR/data/" && echo "- data/.env.example" >> packaging_manifest.txt
          [ -f "data/config.example.json" ] && cp "data/config.example.json" "$RELEASE_DIR/data/" && echo "- data/config.example.json" >> packaging_manifest.txt
          [ -f "data/prompt.txt" ] && cp "data/prompt.txt" "$RELEASE_DIR/data/" && echo "- data/prompt.txt" >> packaging_manifest.txt
          [ -f "data/poll_prompt.txt" ] && cp "data/poll_prompt.txt" "$RELEASE_DIR/data/" && echo "- data/poll_prompt.txt" >> packaging_manifest.txt
          [ -f "data/qa_persona.txt" ] && cp "data/qa_persona.txt" "$RELEASE_DIR/data/" && echo "- data/qa_persona.txt" >> packaging_manifest.txt
          
          # 复制必要文件
          [ -f "requirements.txt" ] && cp requirements.txt "$RELEASE_DIR/" && echo "- requirements.txt" >> packaging_manifest.txt
          [ -f "README.md" ] && cp README.md "$RELEASE_DIR/" && echo "- README.md" >> packaging_manifest.txt
          [ -f "README_EN.md" ] && cp README_EN.md "$RELEASE_DIR/" && echo "- README_EN.md" >> packaging_manifest.txt
          [ -f "CHANGELOG.md" ] && cp CHANGELOG.md "$RELEASE_DIR/" && echo "- CHANGELOG.md" >> packaging_manifest.txt
          [ -f "LICENSE" ] && cp LICENSE "$RELEASE_DIR/" && echo "- LICENSE" >> packaging_manifest.txt
          [ -f "CONTRIBUTING.md" ] && cp CONTRIBUTING.md "$RELEASE_DIR/" && echo "- CONTRIBUTING.md" >> packaging_manifest.txt
          
          # 复制启动脚本
          [ -f "start.bat" ] && cp start.bat "$RELEASE_DIR/" && echo "- start.bat" >> packaging_manifest.txt
          [ -f "start.sh" ] && cp start.sh "$RELEASE_DIR/" && echo "- start.sh" >> packaging_manifest.txt
          
          # 复制 Docker 文件
          [ -f "Dockerfile" ] && cp Dockerfile "$RELEASE_DIR/" && echo "- Dockerfile" >> packaging_manifest.txt
          [ -f "docker-compose.yml" ] && cp docker-compose.yml "$RELEASE_DIR/" && echo "- docker-compose.yml" >> packaging_manifest.txt
          [ -f "docker-entrypoint.sh" ] && cp docker-entrypoint.sh "$RELEASE_DIR/" && echo "- docker-entrypoint.sh" >> packaging_manifest.txt
          [ -f ".dockerignore" ] && cp .dockerignore "$RELEASE_DIR/" && echo "- .dockerignore" >> packaging_manifest.txt
          
          # 设置可执行权限
          chmod +x "$RELEASE_DIR/start.sh" 2>/dev/null || true
          chmod +x "$RELEASE_DIR/docker-entrypoint.sh" 2>/dev/null || true
          
          # 创建压缩包
          echo "" >> packaging_manifest.txt
          echo "🗜️ 正在创建压缩包..." >> packaging_manifest.txt
          tar -czf "${RELEASE_DIR}.tar.gz" "$RELEASE_DIR/"
          zip -q -r "${RELEASE_DIR}.zip" "$RELEASE_DIR/"
          
          # 计算文件大小
          TAR_SIZE=$(du -h "${RELEASE_DIR}.tar.gz" | cut -f1)
          ZIP_SIZE=$(du -h "${RELEASE_DIR}.zip" | cut -f1)
          
          echo "✅ 资源包创建完成" >> packaging_manifest.txt
          echo "- ${RELEASE_DIR}.tar.gz: ${TAR_SIZE}" >> packaging_manifest.txt
          echo "- ${RELEASE_DIR}.zip: ${ZIP_SIZE}" >> packaging_manifest.txt
          
          echo "✅ 资源包创建完成"
          cat packaging_manifest.txt
      
      - name: 上传发布资源
        if: steps.check_version.outputs.SHOULD_CREATE == 'true'
        run: |
          RELEASE_NAME="${{ steps.generate_release_info.outputs.RELEASE_NAME }}"
          ASSET_NAME="Sakura-Bot-${RELEASE_NAME}"
          
          echo "正在上传资源到 Release..."
          gh release upload "$RELEASE_NAME" "${ASSET_NAME}.tar.gz" "${ASSET_NAME}.zip" --clobber
          
          echo "✅ 资源上传完成"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 发送 Telegram 通知
        if: steps.check_version.outputs.SHOULD_CREATE == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHANNEL_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            VERSION="${{ steps.get_version.outputs.PY_VERSION }}"
            COMMITS_COUNT="${{ needs.analyze-changes.outputs.commit_count }}"
            PR_NUMBERS="${{ needs.analyze-changes.outputs.pr_numbers }}"
            RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
            
            MESSAGE="🚀 **新版本发布通知**
            
            Sakura-Bot v${VERSION} 已发布！
            
            📦 版本: v${VERSION}
            📊 包含提交: ${COMMITS_COUNT} 个
            
            📝 相关 PR: ${PR_NUMBERS}
            
            ---
            由 GitHub Actions 自动发布"
            
            # 发送消息到 Telegram，附带按钮
            curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${MESSAGE}" \
              -d "parse_mode=Markdown" \
              -d "disable_web_page_preview=true" \
              -d 'reply_markup={"inline_keyboard":[[{"text":"📄 View Release Notes","url":"'"${RELEASE_URL}"'"}]]}'
            
            echo "✅ Telegram 通知已发送"
          else
            echo "⚠️ 未配置 Telegram 通知"
          fi
      
      - name: 生成发布摘要
        if: steps.check_version.outputs.SHOULD_CREATE == 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.PY_VERSION }}"
          RELEASE_NAME="${{ steps.generate_release_info.outputs.RELEASE_NAME }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${RELEASE_NAME}"
          
          echo "# 🚀 Release ${RELEASE_NAME} 创建成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 版本: **v${VERSION}**" >> $GITHUB_STEP_SUMMARY
          echo "📊 包含提交: **${{ needs.analyze-changes.outputs.commit_count }}** 个" >> $GITHUB_STEP_SUMMARY
          echo "🔗 发布页面: [${RELEASE_URL}](${RELEASE_URL})" >> $GITHUB_STEP_SUMMARY
      
      - name: 更新Release - 创建发布资源包
        if: steps.check_version.outputs.SHOULD_UPDATE == 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.PY_VERSION }}"
          RELEASE_NAME="${{ steps.generate_release_info_update.outputs.RELEASE_NAME }}"
          RELEASE_DIR="Sakura-Bot-${RELEASE_NAME}"
          INCLUDE_TESTS="${{ github.event.inputs.include_tests || 'true' }}"
          INCLUDE_WIKI="${{ github.event.inputs.include_wiki || 'true' }}"
          
          mkdir -p "$RELEASE_DIR"
          
          echo "🔄 正在为已存在的Release打包资源..."
          echo "📋 打包配置:" > packaging_manifest.txt
          echo "- 版本: ${VERSION}" >> packaging_manifest.txt
          echo "- 包含测试: ${INCLUDE_TESTS}" >> packaging_manifest.txt
          echo "- 包含Wiki: ${INCLUDE_WIKI}" >> packaging_manifest.txt
          echo "" >> packaging_manifest.txt
          echo "📦 包含文件:" >> packaging_manifest.txt
          
          # 复制核心代码
          if [ -f "main.py" ]; then 
            cp main.py "$RELEASE_DIR/"
            echo "- main.py" >> packaging_manifest.txt
          fi
          if [ -f "qa_bot.py" ]; then 
            cp qa_bot.py "$RELEASE_DIR/"
            echo "- qa_bot.py" >> packaging_manifest.txt
          fi
          find core -name "*.py" -exec cp --parents {} "$RELEASE_DIR/" \;
          rm -rf "$RELEASE_DIR/core/__pycache__"
          echo "- core/ (所有Python文件)" >> packaging_manifest.txt
          
          # 复制配置文件
          [ -f "pyproject.toml" ] && cp pyproject.toml "$RELEASE_DIR/" && echo "- pyproject.toml" >> packaging_manifest.txt
          [ -f "pytest.ini" ] && cp pytest.ini "$RELEASE_DIR/" && echo "- pytest.ini" >> packaging_manifest.txt
          [ -f ".gitignore" ] && cp .gitignore "$RELEASE_DIR/" && echo "- .gitignore" >> packaging_manifest.txt
          
          # 可选：包含tests目录
          if [ "$INCLUDE_TESTS" = "true" ] && [ -d "tests" ]; then
            cp -r tests "$RELEASE_DIR/"
            echo "- tests/" >> packaging_manifest.txt
          fi
          
          # 可选：包含wiki文档
          if [ "$INCLUDE_WIKI" = "true" ] && [ -d "wiki" ]; then
            cp -r wiki "$RELEASE_DIR/"
            echo "- wiki/" >> packaging_manifest.txt
          fi
          
          # 创建必要的目录
          mkdir -p "$RELEASE_DIR/data"
          mkdir -p "$RELEASE_DIR/data/sessions"
          mkdir -p "$RELEASE_DIR/data/vectors"
          
          # 复制配置文件
          [ -f "data/.env.example" ] && cp "data/.env.example" "$RELEASE_DIR/data/" && echo "- data/.env.example" >> packaging_manifest.txt
          [ -f "data/config.example.json" ] && cp "data/config.example.json" "$RELEASE_DIR/data/" && echo "- data/config.example.json" >> packaging_manifest.txt
          [ -f "data/prompt.txt" ] && cp "data/prompt.txt" "$RELEASE_DIR/data/" && echo "- data/prompt.txt" >> packaging_manifest.txt
          [ -f "data/poll_prompt.txt" ] && cp "data/poll_prompt.txt" "$RELEASE_DIR/data/" && echo "- data/poll_prompt.txt" >> packaging_manifest.txt
          [ -f "data/qa_persona.txt" ] && cp "data/qa_persona.txt" "$RELEASE_DIR/data/" && echo "- data/qa_persona.txt" >> packaging_manifest.txt
          
          # 复制必要文件
          [ -f "requirements.txt" ] && cp requirements.txt "$RELEASE_DIR/" && echo "- requirements.txt" >> packaging_manifest.txt
          [ -f "README.md" ] && cp README.md "$RELEASE_DIR/" && echo "- README.md" >> packaging_manifest.txt
          [ -f "README_EN.md" ] && cp README_EN.md "$RELEASE_DIR/" && echo "- README_EN.md" >> packaging_manifest.txt
          [ -f "CHANGELOG.md" ] && cp CHANGELOG.md "$RELEASE_DIR/" && echo "- CHANGELOG.md" >> packaging_manifest.txt
          [ -f "LICENSE" ] && cp LICENSE "$RELEASE_DIR/" && echo "- LICENSE" >> packaging_manifest.txt
          [ -f "CONTRIBUTING.md" ] && cp CONTRIBUTING.md "$RELEASE_DIR/" && echo "- CONTRIBUTING.md" >> packaging_manifest.txt
          
          # 复制启动脚本
          [ -f "start.bat" ] && cp start.bat "$RELEASE_DIR/" && echo "- start.bat" >> packaging_manifest.txt
          [ -f "start.sh" ] && cp start.sh "$RELEASE_DIR/" && echo "- start.sh" >> packaging_manifest.txt
          
          # 复制 Docker 文件
          [ -f "Dockerfile" ] && cp Dockerfile "$RELEASE_DIR/" && echo "- Dockerfile" >> packaging_manifest.txt
          [ -f "docker-compose.yml" ] && cp docker-compose.yml "$RELEASE_DIR/" && echo "- docker-compose.yml" >> packaging_manifest.txt
          [ -f "docker-entrypoint.sh" ] && cp docker-entrypoint.sh "$RELEASE_DIR/" && echo "- docker-entrypoint.sh" >> packaging_manifest.txt
          [ -f ".dockerignore" ] && cp .dockerignore "$RELEASE_DIR/" && echo "- .dockerignore" >> packaging_manifest.txt
          
          # 设置可执行权限
          chmod +x "$RELEASE_DIR/start.sh" 2>/dev/null || true
          chmod +x "$RELEASE_DIR/docker-entrypoint.sh" 2>/dev/null || true
          
          # 创建压缩包
          echo "" >> packaging_manifest.txt
          echo "🗜️ 正在创建压缩包..." >> packaging_manifest.txt
          tar -czf "${RELEASE_DIR}.tar.gz" "$RELEASE_DIR/"
          zip -q -r "${RELEASE_DIR}.zip" "$RELEASE_DIR/"
          
          # 计算文件大小
          TAR_SIZE=$(du -h "${RELEASE_DIR}.tar.gz" | cut -f1)
          ZIP_SIZE=$(du -h "${RELEASE_DIR}.zip" | cut -f1)
          
          echo "✅ 资源包创建完成" >> packaging_manifest.txt
          echo "- ${RELEASE_DIR}.tar.gz: ${TAR_SIZE}" >> packaging_manifest.txt
          echo "- ${RELEASE_DIR}.zip: ${ZIP_SIZE}" >> packaging_manifest.txt
          
          echo "✅ 资源包创建完成"
          cat packaging_manifest.txt
      
      - name: 更新Release - 上传发布资源
        if: steps.check_version.outputs.SHOULD_UPDATE == 'true'
        run: |
          RELEASE_NAME="${{ steps.generate_release_info_update.outputs.RELEASE_NAME }}"
          ASSET_NAME="Sakura-Bot-${RELEASE_NAME}"
          
          echo "正在更新Release的附件..."
          gh release upload "$RELEASE_NAME" "${ASSET_NAME}.tar.gz" "${ASSET_NAME}.zip" --clobber
          
          echo "✅ Release附件更新完成"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 更新Release - 发送 Telegram 通知
        if: steps.check_version.outputs.SHOULD_UPDATE == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHANNEL_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            VERSION="${{ steps.get_version.outputs.PY_VERSION }}"
            RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
            
            MESSAGE="🔄 **Release附件更新通知**
            
            Sakura-Bot v${VERSION} 的附件已更新！
            
            📦 版本: v${VERSION}
            
            📥 **下载链接**:
            ${RELEASE_URL}
            
            ⚠️ 注意：Release已存在，仅更新了附件文件
            
            ---
            由 GitHub Actions 自动更新"
            
            # 发送消息到 Telegram
            curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${MESSAGE}" \
              -d "parse_mode=Markdown" \
              -d "disable_web_page_preview=true"
            
            echo "✅ Telegram通知已发送"
          else
            echo "⚠️ 未配置 Telegram 通知"
          fi
      
      - name: 更新Release - 生成摘要
        if: steps.check_version.outputs.SHOULD_UPDATE == 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.PY_VERSION }}"
          RELEASE_NAME="${{ steps.generate_release_info_update.outputs.RELEASE_NAME }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${RELEASE_NAME}"
          
          echo "# 🔄 Release ${RELEASE_NAME} 附件更新成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 版本: **v${VERSION}**" >> $GITHUB_STEP_SUMMARY
          echo "🔗 发布页面: [${RELEASE_URL}](${RELEASE_URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **注意**: Release已存在，仅更新了附件文件" >> $GITHUB_STEP_SUMMARY
      
      - name: 清理临时文件
        if: always()
        run: |
          rm -f release_notes.md packaging_manifest.txt
          VERSION="${{ steps.get_version.outputs.PY_VERSION }}"
          rm -rf "Sakura-Bot-v${VERSION}"
          rm -f "Sakura-Bot-v${VERSION}.tar.gz"
          rm -f "Sakura-Bot-v${VERSION}.zip"
          echo "✅ 临时文件已清理"
