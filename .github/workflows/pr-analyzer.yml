name: PR 自动分析并更新 Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  analyze-and-update:
    name: 分析 PR 并更新 Release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_RELEASE_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: 提取 PR 信息
        id: extract_pr_info
        run: |
          echo "PR 标题: ${{ github.event.pull_request.title }}"
          echo "PR 编号: ${{ github.event.pull_request.number }}"
          echo "合并时间: $(date +'%Y-%m-%d')"
          
          # 提取 PR 标签
          LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"
          echo "PR 标签: $LABELS"
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
      
      - name: 分析 PR 类型
        id: analyze_type
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          LABELS="${{ steps.extract_pr_info.outputs.labels }}"
          
          # 根据 PR 标签确定类型
          if echo "$LABELS" | grep -q "enhancement"; then
            CHANGE_TYPE="新增"
          elif echo "$LABELS" | grep -q "bug"; then
            CHANGE_TYPE="修复"
          elif echo "$LABELS" | grep -q "documentation"; then
            CHANGE_TYPE="文档"
          elif echo "$LABELS" | grep -q "refactor"; then
            CHANGE_TYPE="重构"
          elif echo "$LABELS" | grep -q "performance"; then
            CHANGE_TYPE="优化"
          else
            # 根据标题前缀判断
            if echo "$TITLE" | grep -qiE "^(feat|add|new|新增|添加)"; then
              CHANGE_TYPE="新增"
            elif echo "$TITLE" | grep -qiE "^(fix|bug|修复)"; then
              CHANGE_TYPE="修复"
            elif echo "$TITLE" | grep -qiE "^(doc|docs|readme|更新文档)"; then
              CHANGE_TYPE="文档"
            elif echo "$TITLE" | grep -qiE "^(refactor|重构)"; then
              CHANGE_TYPE="重构"
            elif echo "$TITLE" | grep -qiE "^(perf|performance|优化)"; then
              CHANGE_TYPE="优化"
            else
              CHANGE_TYPE="改进"
            fi
          fi
          
          echo "change_type=$CHANGE_TYPE" >> $GITHUB_OUTPUT
          echo "变更类型: $CHANGE_TYPE"
      
      - name: 提取提交信息
        id: extract_commits
        run: |
          COMMITS=$(git log --pretty=format:"%s" ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "相关提交:"
          echo "$COMMITS"
      
      - name: 读取当前版本
        id: read_version
        run: |
          # 读取 main.py 中的当前版本号
          if [ -f main.py ]; then
            CURRENT_VERSION=$(grep -o "__version__ = \"[^\"]*\"" main.py | cut -d'"' -f2)
          else
            CURRENT_VERSION="未知版本"
          fi
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "main.py 当前版本: $CURRENT_VERSION"
          
          # 获取今天日期
          TODAY=$(date +'%Y-%m-%d')
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "今天日期: $TODAY"
      
      - name: 检查 Release 是否存在
        id: check_release
        run: |
          VERSION="${{ steps.read_version.outputs.current_version }}"
          TAG_NAME="v${VERSION}"
          
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Release $TAG_NAME 已存在"
            
            # 获取现有 Release 描述
            gh release view "$TAG_NAME" --json body -q .body > current_body.txt
            echo "现有 Release 描述已读取"
            
            # 解析现有描述中的最新日期
            LAST_DATE=$(grep -oP '\d{4}-\d{2}-\d{2}' current_body.txt | head -1)
            if [ -z "$LAST_DATE" ]; then
              LAST_DATE=""
            fi
            echo "last_date=$LAST_DATE" >> $GITHUB_OUTPUT
            echo "最新条目日期: $LAST_DATE"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Release $TAG_NAME 不存在，将创建新 Release"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_PAT || secrets.GITHUB_TOKEN }}
      
      - name: 生成 Release 描述
        id: generate_release_notes
        run: |
          VERSION="${{ steps.read_version.outputs.current_version }}"
          TODAY="${{ steps.read_version.outputs.today }}"
          CHANGE_TYPE="${{ steps.analyze_type.outputs.change_type }}"
          TITLE="${{ github.event.pull_request.title }}"
          COMMITS="${{ steps.extract_commits.outputs.commits }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          EXISTS="${{ steps.check_release.outputs.exists }}"
          
          if [ "$EXISTS" = "false" ]; then
            # 新 Release：生成初始描述
            {
              echo "## 🎉 Release v${VERSION} - ${TODAY}"
              echo ""
              echo "### ${CHANGE_TYPE}"
              echo "- **${TITLE}** (PR #${PR_NUM})"
              echo ""
            } > new_entry.txt
            
            # 添加提交信息
            if [ -n "$COMMITS" ]; then
              echo "$COMMITS" | while IFS= read -r commit; do
                echo "- ${commit}" >> new_entry.txt
              done
              echo "" >> new_entry.txt
            fi
            
            echo "---" >> new_entry.txt
            echo "" >> new_entry.txt
            
            cat new_entry.txt > release_notes.txt
            rm -f new_entry.txt
            
            echo "生成了新的 Release 描述"
          else
            # 更新现有 Release
            LAST_DATE="${{ steps.check_release.outputs.last_date }}"
            
            # 生成新条目
            {
              echo "### ${CHANGE_TYPE}"
              echo "- **${TITLE}** (PR #${PR_NUM})"
              echo ""
            } > new_entry.txt
            
            if [ -n "$COMMITS" ]; then
              echo "$COMMITS" | while IFS= read -r commit; do
                echo "- ${commit}" >> new_entry.txt
              done
              echo "" >> new_entry.txt
            fi
            
            # 判断追加位置
            if [ "$LAST_DATE" = "$TODAY" ]; then
              # 日期相同：追加到当天条目末尾（在 --- 之前）
              awk -v new_entry="new_entry.txt" '
                BEGIN {
                  inserted = 0
                  while ((getline line < new_entry) > 0) {
                    new_entries[++n] = line
                  }
                  close(new_entry)
                }
                /^---$/ && inserted == 0 {
                  # 在分隔线之前插入新条目
                  for (i = 1; i <= n; i++) {
                    print new_entries[i]
                  }
                  print ""
                  inserted = 1
                }
                { print }
              ' current_body.txt > release_notes.txt
              echo "已追加到今天的条目"
            else
              # 日期不同：在文件开头插入新日期分组
              {
                echo "## 🎉 Release v${VERSION} - ${TODAY}"
                echo ""
              } > header.txt
              cat new_entry.txt >> header.txt
              echo "---" >> header.txt
              echo "" >> header.txt
              cat current_body.txt >> header.txt
              mv header.txt release_notes.txt
              echo "已创建新的日期分组"
            fi
            
            rm -f new_entry.txt
          fi
          
          echo "✅ Release 描述已生成"
          echo "---"
          cat release_notes.txt
          
          # 只输出版本信息，不输出完整内容（避免参数过长）
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "exists=${EXISTS}" >> $GITHUB_OUTPUT
      
      - name: 创建或更新 Release
        run: |
          VERSION="${{ steps.read_version.outputs.current_version }}"
          TAG_NAME="v${VERSION}"
          EXISTS="${{ steps.check_release.outputs.exists }}"
          
          if [ "$EXISTS" = "false" ]; then
            # 创建新 Release
            echo "📝 正在创建 Release ${TAG_NAME}..."
            gh release create "$TAG_NAME" \
              --title "Release ${TAG_NAME}" \
              --notes-file release_notes.txt \
              --latest
            echo "✅ Release ${TAG_NAME} 已创建"
          else
            # 更新现有 Release
            echo "📝 正在更新 Release ${TAG_NAME}..."
            gh release edit "$TAG_NAME" \
              --notes-file release_notes.txt
            echo "✅ Release ${TAG_NAME} 已更新"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_PAT || secrets.GITHUB_TOKEN }}
      
      - name: 更新 CHANGELOG.md 为引流页面
        run: |
          # 检查 CHANGELOG.md 是否已包含引流提示
          if ! grep -q "查看最新的变更日志，请访问" CHANGELOG.md; then
            echo "📝 正在更新 CHANGELOG.md 为引流页面..."
            
            # 创建临时文件
            {
              echo "# 📋 变更日志"
              echo ""
              echo "> **查看最新的变更日志，请访问 [GitHub Releases](https://github.com/${{ github.repository }}/releases)**"
              echo ""
              echo "本文件仅保留用于历史记录参考。完整的版本发布说明和功能变更记录请查看 GitHub Releases 页面。"
              echo ""
              echo "---"
              echo ""
              echo "## 历史变更记录"
              echo ""
              # 保留原有内容
              cat CHANGELOG.md
            } > CHANGELOG.md.new
            
            mv CHANGELOG.md.new CHANGELOG.md
            
            # 提交更改
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "docs: 更新 CHANGELOG.md 为引流页面"
            git push
            
            echo "✅ CHANGELOG.md 已更新为引流页面"
          else
            echo "ℹ️ CHANGELOG.md 已是引流页面，跳过更新"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_PAT || secrets.GITHUB_TOKEN }}
      
      - name: 发送评论到 PR
        uses: actions/github-script@v7
        with:
          script: |
            const version = `${{ steps.read_version.outputs.current_version }}`;
            const exists = `${{ steps.check_release.outputs.exists }}`;
            const action = exists === 'true' ? '更新' : '创建';
            
            // 读取 release_notes.txt 文件内容（前 500 字符）
            const fs = require('fs');
            let notesPreview = '';
            try {
              const notes = fs.readFileSync('release_notes.txt', 'utf8');
              notesPreview = notes.length > 500 ? notes.substring(0, 500) + '...' : notes;
            } catch (e) {
              notesPreview = '(无法读取预览)';
            }
            
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📝 **已${action} Release v${version} 描述**\n\n\`\`\`\n${notesPreview}\n\`\`\`\n\n---\n\n✅ 变更已记录到 [GitHub Releases](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/v${version})`
            })
      
      - name: 清理临时文件
        if: always()
        run: |
          rm -f release_notes.txt current_body.txt 2>/dev/null || true
          echo "✅ 临时文件已清理"